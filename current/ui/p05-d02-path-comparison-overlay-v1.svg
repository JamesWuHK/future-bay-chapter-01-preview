<svg width="1152" height="768" viewBox="0 0 1152 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelFillP05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1520" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#071018" stop-opacity="0.44"/>
    </linearGradient>
    <linearGradient id="strokeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6FBFF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#86E8FF" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="laneBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DDF8FF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#7EE2FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="laneSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FBFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#CBE2F4" stop-opacity="0.64"/>
    </linearGradient>
    <linearGradient id="laneGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF2CC" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F2C46C" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softShadowP05" x="-40" y="-40" width="1232" height="848" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <style>
    .cn {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    .tiny {
      font-size: 14px;
      letter-spacing: 1.8px;
    }
    .body {
      font-size: 18px;
    }
    .title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .tag {
      font-size: 15px;
      font-weight: 600;
    }
    .softPulse {
      animation: softPulse 5.8s ease-in-out infinite;
      transform-origin: center;
    }
    .floatA {
      animation: floatA 7.2s ease-in-out infinite;
      transform-origin: center;
    }
    .floatB {
      animation: floatB 8s ease-in-out infinite;
      transform-origin: center;
    }
    .shimmer {
      animation: shimmer 4.6s ease-in-out infinite;
    }
    @keyframes softPulse {
      0%, 100% { opacity: 0.92; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.008); }
    }
    @keyframes floatA {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(6px); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.82; }
      50% { opacity: 1; }
    }
  </style>

  <g filter="url(#softShadowP05)" opacity="0.12">
    <ellipse cx="874" cy="182" rx="188" ry="132" fill="#A7EEFF"/>
    <ellipse cx="576" cy="635" rx="348" ry="74" fill="#B2E6FF"/>
  </g>

  <g class="floatA">
    <rect x="728" y="66" width="352" height="268" rx="28" fill="url(#panelFillP05)" stroke="url(#strokeBlue)" stroke-width="1.5"/>
    <text x="760" y="108" fill="#D7F8FF" class="cn tiny">SYSTEM PRIORITY WINDOW</text>
    <text x="760" y="146" fill="#F1FBFF" class="cn title">系统更看重什么</text>

    <g class="shimmer">
      <rect x="758" y="176" width="18" height="18" rx="5" fill="#9BE7FF" fill-opacity="0.22" stroke="#C9F7FF" stroke-width="1.5"/>
      <path d="M763 185L768 190L777 180" stroke="#DDFBFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="792" y="191" fill="#F3FBFF" class="cn body">稳定</text>
    </g>

    <g class="shimmer">
      <rect x="758" y="212" width="18" height="18" rx="5" fill="#9BE7FF" fill-opacity="0.22" stroke="#C9F7FF" stroke-width="1.5"/>
      <path d="M763 221L768 226L777 216" stroke="#DDFBFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="792" y="227" fill="#F3FBFF" class="cn body">可复制</text>
    </g>

    <g class="shimmer">
      <rect x="758" y="248" width="18" height="18" rx="5" fill="#9BE7FF" fill-opacity="0.22" stroke="#C9F7FF" stroke-width="1.5"/>
      <path d="M763 257L768 262L777 252" stroke="#DDFBFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="792" y="263" fill="#F3FBFF" class="cn body">易证明</text>
    </g>

    <g class="shimmer">
      <rect x="758" y="284" width="18" height="18" rx="5" fill="#9BE7FF" fill-opacity="0.22" stroke="#C9F7FF" stroke-width="1.5"/>
      <path d="M763 293L768 298L777 288" stroke="#DDFBFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="792" y="299" fill="#F3FBFF" class="cn body">高回报</text>
    </g>

    <g opacity="0.5">
      <rect x="910" y="176" width="18" height="18" rx="5" fill="#E9F6FF" fill-opacity="0.08" stroke="#B9D8E7" stroke-width="1.2"/>
      <text x="944" y="191" fill="#B7CCD8" class="cn body">真实热爱</text>
      <rect x="910" y="212" width="18" height="18" rx="5" fill="#E9F6FF" fill-opacity="0.08" stroke="#B9D8E7" stroke-width="1.2"/>
      <text x="944" y="227" fill="#B7CCD8" class="cn body">长期意义</text>
    </g>

    <rect x="758" y="284" width="290" height="1" fill="#C9F6FF" fill-opacity="0.16"/>
    <text x="760" y="320" fill="#A9DDED" class="cn body">系统已高亮 4 项公共排序因子</text>
  </g>

  <g class="floatB">
    <rect x="102" y="560" width="948" height="128" rx="30" fill="url(#panelFillP05)" stroke="url(#strokeBlue)" stroke-width="1.5"/>
    <text x="144" y="598" fill="#D7F8FF" class="cn tiny">PATH COMPARISON STRIP</text>

    <g class="softPulse">
      <rect x="138" y="616" width="260" height="44" rx="22" fill="#071922" fill-opacity="0.48" stroke="url(#laneBlue)" stroke-width="1.5"/>
      <circle cx="168" cy="638" r="8" fill="url(#laneBlue)"/>
      <text x="188" y="644" fill="#F2FBFF" class="cn tag">路径 A  高维系统规划师</text>
    </g>

    <g opacity="0.9">
      <rect x="430" y="616" width="260" height="44" rx="22" fill="#071922" fill-opacity="0.42" stroke="url(#laneSilver)" stroke-width="1.5"/>
      <circle cx="460" cy="638" r="8" fill="url(#laneSilver)"/>
      <text x="480" y="644" fill="#F2FBFF" class="cn tag">路径 B  折中训练路线</text>
    </g>

    <g opacity="0.9">
      <rect x="722" y="616" width="292" height="44" rx="22" fill="#071922" fill-opacity="0.42" stroke="url(#laneGold)" stroke-width="1.5"/>
      <circle cx="752" cy="638" r="8" fill="url(#laneGold)"/>
      <text x="772" y="644" fill="#FFF7E8" class="cn tag">路径 C  风声采集学徒</text>
    </g>
  </g>

  <g class="floatA">
    <rect x="136" y="92" width="236" height="136" rx="24" fill="url(#panelFillP05)" stroke="url(#strokeBlue)" stroke-width="1.3"/>
    <text x="164" y="130" fill="#D4F8FF" class="cn tiny">ACTIVE FUTURE SLICE</text>
    <text x="164" y="166" fill="#F2FBFF" class="cn title">路径 A 已展开</text>
    <text x="164" y="198" fill="#D4EEF9" class="cn body">高成功率 · 高社会认可 · 高资源匹配</text>
  </g>

  <g class="floatB">
    <rect x="424" y="118" width="188" height="98" rx="22" fill="#071922" fill-opacity="0.4" stroke="#D4F8FF" stroke-opacity="0.2"/>
    <text x="452" y="154" fill="#D5F6FF" class="cn body">系统中心值守</text>
    <text x="452" y="184" fill="#A7D7E8" class="cn body">表彰记录已锁定</text>
  </g>

  <g class="floatA">
    <rect x="424" y="236" width="188" height="98" rx="22" fill="#071922" fill-opacity="0.4" stroke="#D4F8FF" stroke-opacity="0.2"/>
    <text x="452" y="272" fill="#D5F6FF" class="cn body">深夜仍听风样本</text>
    <text x="452" y="302" fill="#A7D7E8" class="cn body">个人异响仍未消失</text>
  </g>
</svg>
