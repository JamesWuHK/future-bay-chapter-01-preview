name: Sync Preview From Source Repo

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

concurrency:
  group: future-bay-preview-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest preview HTML and referenced assets
        env:
          SOURCE_OWNER: JamesWuHK
          SOURCE_REPO: ai-future-civilization-course-k12
          SOURCE_REF: main
          SOURCE_ROOT: outputs/2026-03-22-chapter-01-dashscope-character-lock
          SOURCE_HTML: chapter-01-main-character-dossier.html
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import shutil
          import urllib.request
          from pathlib import Path

          owner = os.environ["SOURCE_OWNER"]
          repo = os.environ["SOURCE_REPO"]
          ref = os.environ["SOURCE_REF"]
          source_root = os.environ["SOURCE_ROOT"].strip("/")
          source_html = os.environ["SOURCE_HTML"]
          repo_root = Path.cwd()

          api_base = f"https://api.github.com/repos/{owner}/{repo}"
          raw_base = f"https://raw.githubusercontent.com/{owner}/{repo}/{ref}/{source_root}"
          html_url = f"{raw_base}/{source_html}"
          branch_url = f"{api_base}/branches/{ref}"

          def fetch_text(url: str) -> str:
              req = urllib.request.Request(url, headers={"User-Agent": "future-bay-preview-sync"})
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read().decode("utf-8")

          def fetch_json(url: str):
              return json.loads(fetch_text(url))

          def fetch_binary(url: str) -> bytes:
              req = urllib.request.Request(url, headers={"User-Agent": "future-bay-preview-sync"})
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return resp.read()

          branch_info = fetch_json(branch_url)
          source_sha = branch_info["commit"]["sha"]

          html = fetch_text(html_url)
          html = re.sub(r'(</head>)', f'\n  <!-- synced-from: {owner}/{repo}@{source_sha} -->\n\\1', html, count=1)

          (repo_root / "index.html").write_text(html, encoding="utf-8")
          (repo_root / "chapter-01-main-character-dossier.html").write_text(html, encoding="utf-8")

          asset_pattern = re.compile(r'(?:src|data|href)="((?:characters|scenes|shots|ui|videos|current)/[^"]+)"')
          referenced_files = sorted({match.group(1).split("?", 1)[0] for match in asset_pattern.finditer(html)})

          for asset_dir in ["characters", "scenes", "shots", "ui", "videos", "current"]:
              shutil.rmtree(repo_root / asset_dir, ignore_errors=True)

          for rel_path in referenced_files:
              target = repo_root / rel_path
              target.parent.mkdir(parents=True, exist_ok=True)
              binary = fetch_binary(f"{raw_base}/{rel_path}")
              target.write_bytes(binary)

          (repo_root / ".nojekyll").touch()
          (repo_root / "README.md").write_text(
              "# Future Bay Chapter 01 Preview\n\n"
              f"Auto-synced from {owner}/{repo}@{source_sha}.\n",
              encoding="utf-8",
          )
          PY

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync preview from source repo main"
          git push
