<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter 01 资产总览</title>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #edf4fb 0%, #f8fbfd 100%);
      color: #1f2d3a;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #d7e1ea;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 36px rgba(32, 66, 94, 0.06);
    }
    h1 { margin: 0 0 12px; font-size: 30px; }
    p { margin: 0 0 12px; line-height: 1.8; }
    a { color: #2d7aa2; font-weight: 700; }
    .muted { color: #5e7386; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Chapter 01 资产总览</h1>
      <p>正在载入已恢复的完整资产总览页：演员定妆、人设、整集剧本、分镜脚本文字与当前资产都会在同一页内显示。</p>
      <p class="muted">如果浏览器没有自动载入，可直接打开下面这条恢复入口。</p>
      <p><a href="https://raw.githubusercontent.com/JamesWuHK/future-bay-chapter-01-preview/e9b7ddce7a26ff08f43a56f38d34c6d2132ca085/index.html">打开完整恢复版资产总览</a></p>
    </div>
  </div>
  <script>
    const restoredUrl = 'https://raw.githubusercontent.com/JamesWuHK/future-bay-chapter-01-preview/e9b7ddce7a26ff08f43a56f38d34c6d2132ca085/index.html';
    fetch(restoredUrl, { cache: 'no-store' })
      .then((resp) => {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.text();
      })
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch((error) => {
        console.error('Failed to load restored dossier:', error);
      });
  </script>
</body>
</html>
