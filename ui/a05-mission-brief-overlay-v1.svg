<svg width="1152" height="768" viewBox="0 0 1152 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .stage-top,
    .stage-core,
    .stage-title,
    .stage-left,
    .stage-right,
    .stage-team,
    .stage-countdown,
    .stage-actions {
      opacity: 0;
      animation-duration: 5s;
      animation-iteration-count: infinite;
      animation-timing-function: cubic-bezier(0.22, 0.78, 0.22, 1);
      animation-fill-mode: both;
      transform-box: fill-box;
      transform-origin: center;
    }
    .stage-top { animation-name: fadeTop; }
    .stage-core { animation-name: fadeCore; }
    .stage-title { animation-name: fadeTitle; }
    .stage-left { animation-name: fadeLeft; }
    .stage-right { animation-name: fadeRight; }
    .stage-team { animation-name: fadeTeam; }
    .stage-countdown { animation-name: fadeCountdown; }
    .stage-actions { animation-name: fadeActions; }
    .soft-drift {
      animation: softDrift 5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .core-breathe {
      animation: coreBreathe 5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .button-settle {
      animation: buttonSettle 5s cubic-bezier(0.18, 0.82, 0.22, 1) infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .countdown-pulse {
      animation: countdownPulse 5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: left center;
    }
    .button-glow {
      animation: buttonGlow 5s ease-in-out infinite;
    }
    .status-shimmer {
      animation: statusShimmer 5s ease-in-out infinite;
    }

    @keyframes fadeTop {
      0%, 5% { opacity: 0; transform: translateY(-12px) scale(0.985); }
      11% { opacity: 0.94; transform: translateY(0px) scale(1); }
      94% { opacity: 0.94; transform: translateY(0px) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.99); }
    }
    @keyframes fadeCore {
      0%, 8% { opacity: 0; transform: scale(0.96); }
      16% { opacity: 1; transform: scale(1); }
      95% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.985); }
    }
    @keyframes fadeTitle {
      0%, 15% { opacity: 0; transform: translateY(18px); }
      24% { opacity: 1; transform: translateY(0px); }
      95% { opacity: 1; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(8px); }
    }
    @keyframes fadeLeft {
      0%, 24% { opacity: 0; transform: translateX(-22px) translateY(9px); }
      35% { opacity: 1; transform: translateX(0px) translateY(0px); }
      95% { opacity: 1; transform: translateX(0px) translateY(0px); }
      100% { opacity: 0; transform: translateX(-10px) translateY(5px); }
    }
    @keyframes fadeRight {
      0%, 32% { opacity: 0; transform: translateX(24px) translateY(10px); }
      44% { opacity: 1; transform: translateX(0px) translateY(0px); }
      95% { opacity: 1; transform: translateX(0px) translateY(0px); }
      100% { opacity: 0; transform: translateX(10px) translateY(4px); }
    }
    @keyframes fadeTeam {
      0%, 41% { opacity: 0; transform: translateY(18px) scale(0.972); }
      54% { opacity: 1; transform: translateY(0px) scale(1); }
      95% { opacity: 1; transform: translateY(0px) scale(1); }
      100% { opacity: 0; transform: translateY(8px) scale(0.988); }
    }
    @keyframes fadeCountdown {
      0%, 53% { opacity: 0; transform: translateX(-12px) translateY(14px) scale(0.975); }
      65% { opacity: 1; transform: translateX(0px) translateY(0px) scale(1); }
      95% { opacity: 1; transform: translateX(0px) translateY(0px) scale(1); }
      100% { opacity: 0; transform: translateX(-8px) translateY(6px) scale(0.99); }
    }
    @keyframes fadeActions {
      0%, 61% { opacity: 0; transform: translateY(20px) scale(0.965); }
      72% { opacity: 1; transform: translateY(0px) scale(1); }
      95% { opacity: 1; transform: translateY(0px) scale(1); }
      100% { opacity: 0; transform: translateY(8px) scale(0.99); }
    }
    @keyframes softDrift {
      0%, 100% { transform: translateY(0px); }
      24% { transform: translateY(-2px); }
      58% { transform: translateY(1.5px); }
      82% { transform: translateY(-1px); }
    }
    @keyframes coreBreathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      34% { transform: scale(1.01); opacity: 0.96; }
      66% { transform: scale(0.994); opacity: 1; }
      84% { transform: scale(1.006); opacity: 0.97; }
    }
    @keyframes buttonSettle {
      0%, 64% { transform: translateY(16px) scale(0.97); }
      72% { transform: translateY(0px) scale(1); }
      77% { transform: translateY(-2px) scale(1.012); }
      84% { transform: translateY(0px) scale(1); }
      89% { transform: translateY(-0.5px) scale(1.004); }
      100% { transform: translateY(0px) scale(1); }
    }
    @keyframes countdownPulse {
      0%, 63% { opacity: 0; transform: translateX(-3px); }
      65% { opacity: 1; transform: translateX(0px); }
      75% { opacity: 0.94; transform: translateX(0px); }
      84% { opacity: 1; transform: translateX(0.5px); }
      100% { opacity: 0.97; transform: translateX(0px); }
    }
    @keyframes buttonGlow {
      0%, 72% { opacity: 0.92; }
      80% { opacity: 1; }
      88% { opacity: 0.95; }
      100% { opacity: 0.98; }
    }
    @keyframes statusShimmer {
      0%, 45% { opacity: 0.86; }
      56% { opacity: 1; }
      74% { opacity: 0.92; }
      100% { opacity: 0.98; }
    }
  </style>
  <defs>
    <linearGradient id="ringStroke" x1="576" y1="126" x2="576" y2="662" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#B6E9FF" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="166" y1="168" x2="985" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF8FF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#8FDFFF" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="180" y1="172" x2="956" y2="596" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FCFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A6DCF6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="260" y1="392" x2="891" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8CE9FF" stop-opacity="0.2"/>
      <stop offset="0.18" stop-color="#8CE9FF"/>
      <stop offset="0.82" stop-color="#8CE9FF"/>
      <stop offset="1" stop-color="#8CE9FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="0" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F8FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#9DD7EF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softGlow" x="-40" y="-40" width="1232" height="848" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="achaoGlow" x="820" y="84" width="260" height="130" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <g class="stage-core core-breathe" filter="url(#softGlow)" opacity="0.14">
    <ellipse cx="577" cy="390" rx="260" ry="140" fill="#91EEFF"/>
  </g>

  <g class="stage-core core-breathe">
    <circle cx="576" cy="390" r="122" stroke="url(#ringStroke)" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="576" cy="390" r="154" stroke="url(#ringStroke)" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M260 392C325 392 378 360 426 360C483 360 505 416 575 416C639 416 673 350 745 350C807 350 835 392 891 392" stroke="url(#accentLine)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="260" cy="392" r="10" fill="#8CE9FF"/>
    <circle cx="427" cy="360" r="9" fill="#8CE9FF"/>
    <circle cx="575" cy="416" r="9" fill="#8CE9FF"/>
    <circle cx="745" cy="350" r="9" fill="#8CE9FF"/>
    <circle cx="891" cy="392" r="10" fill="#8CE9FF"/>
  </g>

  <g class="stage-title soft-drift">
    <rect x="158" y="166" width="836" height="432" rx="28" fill="url(#panelFill)" stroke="url(#panelStroke)" stroke-width="2"/>
    <rect x="188" y="196" width="776" height="372" rx="22" fill="#07111C" fill-opacity="0.14" stroke="#D9F6FF" stroke-opacity="0.16"/>
  </g>

  <g class="stage-left soft-drift">
    <text x="576" y="224" text-anchor="middle" fill="#F4FBFF" font-size="32" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600" letter-spacing="2">时间档案城紧急请求</text>
    <text x="576" y="258" text-anchor="middle" fill="#BEEBFF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">一名 12 岁居民拒绝签署《最优人生路径确认书》</text>
  </g>

  <g class="stage-right soft-drift">
    <rect x="220" y="274" width="272" height="168" rx="22" fill="#0B1624" fill-opacity="0.24" stroke="#D5F4FF" stroke-opacity="0.22"/>
    <text x="248" y="312" fill="#F2FAFF" font-size="20" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600">任务目标</text>
    <text x="248" y="346" fill="#D9F4FF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">以未来湾固定小队身份</text>
    <text x="248" y="376" fill="#D9F4FF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">进入时间档案城，确认</text>
    <text x="248" y="406" fill="#D9F4FF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">这条人生是否被完整看见。</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.08;0.44;0.82;0.62;0.18;0" keyTimes="0;0.52;0.6;0.67;0.75;0.82;0.9;1" dur="7.2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="216 -90;182 -70;146 -48;104 -28;48 -10;-4 3;-34 10;216 -90" keyTimes="0;0.52;0.6;0.68;0.76;0.84;0.92;1" dur="7.2s" repeatCount="indefinite"/>
    <g filter="url(#achaoGlow)">
      <path d="M826 180C865 170 910 160 972 137" stroke="#8FEAFF" stroke-opacity="0.36" stroke-width="8" stroke-linecap="round"/>
      <path d="M854 164C902 151 949 136 1016 114" stroke="#8FEAFF" stroke-opacity="0.2" stroke-width="4" stroke-linecap="round"/>
      <path d="M966 135C986 128 1005 123 1030 118" stroke="#D9F8FF" stroke-opacity="0.72" stroke-width="4" stroke-linecap="round"/>
      <path d="M1006 116L1041 108L1015 131Z" fill="#E7FBFF" fill-opacity="0.62"/>
      <circle cx="1008" cy="120" r="5.5" fill="#FFE3AE" fill-opacity="0.78"/>
    </g>
  </g>

  <g class="stage-team button-settle status-shimmer">
    <rect x="661" y="274" width="272" height="210" rx="22" fill="#0B1624" fill-opacity="0.24" stroke="#D5F4FF" stroke-opacity="0.22"/>
    <text x="689" y="312" fill="#F2FAFF" font-size="20" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600">队伍状态</text>

    <rect x="689" y="334" width="216" height="30" rx="15" fill="#E6FAFF" fill-opacity="0.10" stroke="#C9F0FF" stroke-opacity="0.16"/>
    <text x="707" y="354" fill="#DDF6FF" font-size="15" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">祁野：证据链检查中</text>

    <rect x="689" y="372" width="216" height="30" rx="15" fill="#E6FAFF" fill-opacity="0.10" stroke="#C9F0FF" stroke-opacity="0.16"/>
    <text x="707" y="392" fill="#DDF6FF" font-size="15" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">闻夏：公共陈词准备中</text>

    <rect x="689" y="410" width="216" height="30" rx="15" fill="#E6FAFF" fill-opacity="0.10" stroke="#C9F0FF" stroke-opacity="0.16"/>
    <text x="707" y="430" fill="#DDF6FF" font-size="15" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">回响：协作协议在线</text>

    <rect x="689" y="448" width="216" height="30" rx="15" fill="#E6FAFF" fill-opacity="0.10" stroke="#C9F0FF" stroke-opacity="0.16"/>
    <text x="707" y="468" fill="#DDF6FF" font-size="15" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">阿潮：航线已预热</text>
  </g>

  <g class="stage-countdown soft-drift">
    <rect x="220" y="468" width="272" height="86" rx="20" fill="#0B1624" fill-opacity="0.20" stroke="#D5F4FF" stroke-opacity="0.18"/>
    <text x="248" y="502" fill="#F2FAFF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600">倒计时</text>
    <text class="countdown-pulse" x="248" y="536" fill="#BCEFFF" font-size="28" font-family="'SFMono-Regular','Menlo','PingFang SC',monospace" letter-spacing="2">距午夜归档 05:59:48</text>
  </g>

  <g class="stage-actions button-settle">
    <rect class="button-glow" x="412" y="620" width="150" height="52" rx="26" fill="url(#buttonFill)" stroke="#D5F4FF" stroke-opacity="0.28"/>
    <text x="487" y="653" text-anchor="middle" fill="#E8F9FF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif">查看任务简报</text>

    <rect class="button-glow" x="590" y="620" width="150" height="52" rx="26" fill="#DFFBFF" fill-opacity="0.18" stroke="#BDF0FF" stroke-opacity="0.48"/>
    <text x="665" y="653" text-anchor="middle" fill="#F3FCFF" font-size="18" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600">接受航行</text>
  </g>
</svg>
